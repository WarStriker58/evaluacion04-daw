server:
  port: 8083

spring:
  datasource:
    url: jdbc:mysql://db-tareas:3306/db_tareas?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: rootpassword
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

custom:
  message: "Bienvenido al Microservicio de Tareas y Seguimiento Operativo"

# Configuración del Circuit Breaker y Retry para Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      usuariosCB:
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10000ms
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
  retry:
    instances:
      usuariosRetry:
        maxAttempts: 3
        waitDuration: 2000ms
